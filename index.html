<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link href="style.css" rel="stylesheet" type="text/css" />
        <style>
            /* CSS */
        </style>

        <title>Title</title>
    </head>
    <body>
        <!-- HTML -->

        <!-- Kaboom JS -->
        <script src="https://unpkg.com/kaboom/dist/kaboom.js"></script>
        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

        <script>

            kaboom({
                background: [0, 0, 0],
            });

      
            scene("mainScene", () => {

                const map = addLevel([
                    "                                    $   $",
                    "                          $                 ",
                    "           $$         =       $     $$      ",
                    "  %      ====       ==    ==       ====     ",
                    "              $                     =       ",
                    "       ^^      =    ^^     =    ^^   =   & ",
                    "   $    ====         ====          ======== ",
                    "============================================",
                ], {
                    tileWidth: 32,
                    tileHeight: 32,

                    tiles: {
                        "=": () => [
                            rect(32, 32),
                            area(),
                            body({ isStatic: true }),
                            color(100, 200, 100),
                        ],
                        "$": () => [
                            rect(16, 16),
                            area(),
                            pos(8, 8),
                            color(255, 215, 0),
                            "collectible",
                        ],
                        "^": () => [
                            rect(32, 32),
                            area(),
                            color(255, 0, 0),
                            "hazard",
                        ],
                        "%": () => [
                            rect(32, 32),
                            area(),
                            color(0, 0, 255),
                            "startPoint",
                        ],
                        "&": () => [
                            rect(32, 32),
                            area(),
                            color(255, 255, 255),
                            "endPoint",
                        ],
                    }
                });

            });

            // start the scene
            go("mainScene");
        </script>
    </body>
</html>
